<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coursework Reward Tracker — Prodigy Solutions</title>
<style>
  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --surface2: #f0efe9;
    --border: #e2e0d8;
    --border-strong: #c8c6bc;
    --text: #1a1917;
    --text-muted: #706e67;
    --text-faint: #a09e97;
    --green-bg: #eaf5ec;
    --green-text: #1e6b32;
    --green-border: #b4debb;
    --amber-bg: #fef7ec;
    --amber-text: #7a4d0a;
    --amber-border: #f5d898;
    --red-bg: #fdf0f0;
    --red-text: #8b1f1f;
    --blue-bg: #eff5ff;
    --blue-text: #1a3f7a;
    --blue-border: #b8d0f5;
    --radius: 8px;
    --radius-lg: 12px;
    --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.05);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.09);
    --mono: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 30px;
    height: 30px;
    background: #1a1917;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-text {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  .logo-sub {
    font-size: 12px;
    color: var(--text-muted);
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .version-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--text-faint);
    padding: 3px 9px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    white-space: nowrap;
    text-decoration: none;
  }

  .version-badge:hover {
    background: var(--surface2);
    color: var(--text-muted);
  }

  .version-badge svg {
    flex-shrink: 0;
  }

  #sync-status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-faint);
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    white-space: nowrap;
  }

  #sync-status .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  #sync-status.synced .dot { background: #4caf6e; }
  #sync-status.saving .dot { background: #f0a940; animation: pulse 1s infinite; }
  #sync-status.local .dot { background: var(--text-faint); }
  #sync-status.error .dot { background: #d94f4f; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  main {
    max-width: 980px;
    margin: 0 auto;
    padding: 32px 24px;
  }

  button {
    font-family: var(--sans);
    font-size: 13px;
    padding: 7px 14px;
    border-radius: var(--radius);
    cursor: pointer;
    border: 1px solid var(--border-strong);
    background: var(--surface);
    color: var(--text);
    font-weight: 500;
    transition: background 0.1s, border-color 0.1s, transform 0.08s;
    white-space: nowrap;
  }

  button:hover { background: var(--surface2); }
  button:active { transform: scale(0.98); }
  button:disabled {
    opacity: 0.38;
    cursor: default;
    pointer-events: none;
  }

  .btn-primary {
    background: #1a1917;
    color: #fff;
    border-color: #1a1917;
  }

  .btn-primary:hover {
    background: #333;
    border-color: #333;
  }

  .btn-success {
    background: var(--green-bg);
    color: var(--green-text);
    border-color: var(--green-border);
  }

  .btn-success:hover { background: #d7f0db; }

  .btn-danger {
    background: var(--red-bg);
    color: var(--red-text);
    border-color: #e8b8b8;
  }

  .btn-danger:hover { background: #fadcdc; }

  .btn-sm {
    font-size: 12px;
    padding: 5px 10px;
  }

  .btn-ghost {
    background: transparent;
    border-color: transparent;
    color: var(--text-muted);
  }

  .btn-ghost:hover {
    background: var(--surface2);
    border-color: var(--border);
  }

  input[type="text"], input[type="number"], select, textarea {
    font-family: var(--sans);
    font-size: 13px;
    padding: 7px 11px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  input[type="text"]:focus, input[type="number"]:focus, select:focus, textarea:focus {
    border-color: #888;
    box-shadow: 0 0 0 3px rgba(0,0,0,0.06);
  }

  textarea {
    resize: vertical;
    min-height: 72px;
    width: 100%;
    line-height: 1.5;
  }

  .upload-wrap {
    max-width: 560px;
    margin: 48px auto 0;
  }

  .upload-header {
    text-align: center;
    margin-bottom: 32px;
  }

  .upload-header h1 {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 6px;
  }

  .upload-header p {
    color: var(--text-muted);
    font-size: 14px;
  }

  .drop-zone {
    border: 1.5px dashed var(--border-strong);
    border-radius: var(--radius-lg);
    padding: 28px 24px;
    text-align: center;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    background: var(--surface);
    margin-bottom: 12px;
  }

  .drop-zone:hover, .drop-zone.drag-over {
    background: var(--blue-bg);
    border-color: #90b4e8;
  }

  .drop-zone-icon {
    width: 40px;
    height: 40px;
    background: var(--surface2);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 12px;
  }

  .drop-zone-title {
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 4px;
  }

  .drop-zone-sub {
    font-size: 12px;
    color: var(--text-muted);
  }

  .file-loaded {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    background: var(--green-bg);
    color: var(--green-text);
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    margin-top: 8px;
    border: 1px solid var(--green-border);
  }

  .sp-banner {
    background: var(--blue-bg);
    border: 1px solid var(--blue-border);
    border-radius: var(--radius);
    padding: 12px 16px;
    font-size: 13px;
    color: var(--blue-text);
    margin-top: 16px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }

  .sp-banner-icon {
    font-size: 16px;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .ledger-notice {
    background: var(--amber-bg);
    border: 1px solid var(--amber-border);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-size: 13px;
    color: var(--amber-text);
    margin-top: 12px;
  }

  .last-updated-banner {
    background: var(--blue-bg);
    border: 1px solid var(--blue-border);
    border-radius: var(--radius-lg);
    padding: 12px 14px;
    margin-bottom: 16px;
    color: var(--blue-text);
    display: flex;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
    box-shadow: var(--shadow);
  }

  .last-updated-title {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .last-updated-text {
    font-size: 13px;
  }

  .signin-banner {
    background: var(--amber-bg);
    border: 1px solid var(--amber-border);
    border-radius: var(--radius-lg);
    padding: 14px 16px;
    margin-bottom: 16px;
    color: var(--amber-text);
    box-shadow: var(--shadow);
  }

  .signin-banner h3 {
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .signin-banner p {
    font-size: 12px;
    margin-bottom: 10px;
  }

  .signin-row {
    display: flex;
    gap: 8px;
  }

  .signin-row input {
    flex: 1;
  }

  .map-wrap {
    max-width: 560px;
    margin: 40px auto 0;
  }

  .map-section-title {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-faint);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .map-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }

  .map-label {
    width: 180px;
    font-size: 13px;
    color: var(--text-muted);
    flex-shrink: 0;
  }

  .map-select {
    flex: 1;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px 18px;
    box-shadow: var(--shadow);
  }

  .stat-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-faint);
    margin-bottom: 6px;
  }

  .stat-value {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .stat-value.green { color: var(--green-text); }

  .controls-bar {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .search-input {
    flex: 1;
    min-width: 200px;
  }

  .section-heading {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--text-faint);
    padding: 0 0 8px;
    margin: 20px 0 6px;
    border-bottom: 1px solid var(--border);
  }

  .inmate-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    margin-bottom: 6px;
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: box-shadow 0.15s;
  }

  .inmate-card:hover { box-shadow: var(--shadow-md); }

  .inmate-header {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    cursor: pointer;
    gap: 12px;
    user-select: none;
  }

  .badge {
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
    flex-shrink: 0;
    min-width: 90px;
    text-align: center;
  }

  .badge-eligible {
    background: var(--green-bg);
    color: var(--green-text);
    border: 1px solid var(--green-border);
  }

  .badge-pending {
    background: var(--surface2);
    color: var(--text-muted);
    border: 1px solid var(--border);
  }

  .inmate-name {
    flex: 1;
    min-width: 0;
  }

  .inmate-name-primary {
    font-size: 14px;
    font-weight: 600;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .inmate-name-sub {
    font-size: 11px;
    color: var(--text-faint);
    font-family: var(--mono);
    margin-top: 1px;
  }

  .inmate-time {
    text-align: right;
    flex-shrink: 0;
  }

  .inmate-time-main {
    font-size: 13px;
    font-family: var(--mono);
    font-weight: 500;
  }

  .inmate-time-sub {
    font-size: 11px;
    color: var(--text-faint);
    margin-top: 1px;
  }

  .inmate-chevron {
    color: var(--text-faint);
    font-size: 10px;
    flex-shrink: 0;
    transition: transform 0.15s;
  }

  .inmate-chevron.open { transform: rotate(180deg); }

  .inmate-detail {
    border-top: 1px solid var(--border);
    padding: 16px;
    background: var(--surface2);
    display: none;
  }

  .inmate-detail.open { display: block; }

  .detail-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 14px;
  }

  .detail-stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
  }

  .detail-stat-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-faint);
    margin-bottom: 4px;
  }

  .detail-stat-value {
    font-size: 16px;
    font-weight: 700;
    font-family: var(--mono);
    letter-spacing: -0.01em;
  }

  .action-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    align-items: center;
    flex-wrap: wrap;
  }

  .note-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-faint);
    margin-bottom: 6px;
  }

  .last-applied {
    font-size: 11px;
    color: var(--text-faint);
    margin-top: 8px;
  }

  .progress-bar-wrap {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 6px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    border-radius: 2px;
    background: #1a1917;
    transition: width 0.3s ease;
  }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
  }

  .empty-state-title {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .divider {
    width: 1px;
    height: 20px;
    background: var(--border);
    display: inline-block;
    margin: 0 2px;
    vertical-align: middle;
  }

  .history-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    margin-top: 12px;
  }

  .history-item {
    font-size: 12px;
    color: var(--text-muted);
    padding: 3px 0;
    border-bottom: 1px solid var(--border);
  }

  .history-item:last-child {
    border-bottom: none;
  }

  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.42);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    padding: 24px;
    animation: fade-in 0.12s ease-out;
  }

  @keyframes fade-in {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .modal {
    background: var(--surface);
    border-radius: var(--radius-lg);
    padding: 22px;
    max-width: 460px;
    width: 100%;
    max-height: 84vh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 20px 50px rgba(0,0,0,0.22);
  }

  .modal-wide { max-width: 640px; }

  .modal h2 {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin-bottom: 4px;
  }

  .modal-subtitle {
    color: var(--text-muted);
    font-size: 13px;
    margin-bottom: 16px;
  }

  .modal-body {
    flex: 1;
    overflow-y: auto;
    min-height: 0;
  }

  .modal-footer {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 18px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }

  .modal-footer-info {
    flex: 1;
    color: var(--text-muted);
    font-size: 12px;
    align-self: center;
    text-align: left;
  }

  .bulk-list {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    max-height: 360px;
    overflow-y: auto;
  }

  .bulk-facility {
    background: var(--surface2);
    padding: 6px 12px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 1;
  }

  .bulk-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }

  .bulk-item:last-child { border-bottom: none; }

  .bulk-item input[type="checkbox"] {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
    cursor: pointer;
  }

  .bulk-item-name {
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .bulk-item-uname {
    color: var(--text-faint);
    font-family: var(--mono);
    font-size: 11px;
    margin-left: 6px;
  }

  .bulk-item-rewards {
    font-weight: 600;
    color: var(--green-text);
    font-size: 12px;
    background: var(--green-bg);
    padding: 2px 8px;
    border-radius: 10px;
    border: 1px solid var(--green-border);
    white-space: nowrap;
  }

  .bulk-radio-row {
    display: flex;
    gap: 16px;
    margin-bottom: 12px;
    font-size: 13px;
  }

  .bulk-radio-row label {
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
  }

  .bulk-toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    font-size: 12px;
  }

  .bulk-toolbar button {
    font-size: 12px;
    padding: 3px 8px;
  }

  .form-row {
    margin-bottom: 14px;
  }

  .form-label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 4px;
  }

  .form-help {
    font-size: 11px;
    color: var(--text-faint);
    margin-top: 4px;
  }

  .user-chip-wrap {
    position: relative;
  }

  .user-menu {
    position: absolute;
    right: 0;
    top: calc(100% + 6px);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow-md);
    min-width: 170px;
    z-index: 110;
    overflow: hidden;
    display: none;
  }

  .user-menu.open { display: block; }

  .user-menu-item {
    display: block;
    width: 100%;
    padding: 8px 14px;
    border: none;
    background: transparent;
    text-align: left;
    font-size: 13px;
    cursor: pointer;
    color: var(--text);
    border-radius: 0;
  }

  .user-menu-item:hover { background: var(--surface2); }

  .user-menu-divider {
    height: 1px;
    background: var(--border);
    margin: 4px 0;
  }

  #toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: #1a1917;
    color: #fff;
    padding: 10px 18px;
    border-radius: var(--radius-lg);
    font-size: 13px;
    font-weight: 500;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    z-index: 999;
    max-width: 320px;
  }

  #toast.show {
    opacity: 1;
    transform: translateY(0);
  }

  @media (max-width: 640px) {
    main { padding: 20px 16px; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .detail-grid { grid-template-columns: repeat(2, 1fr); }
    header { padding: 0 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <rect x="2" y="8" width="3" height="6" rx="1" fill="white" opacity="0.9"/>
        <rect x="6.5" y="5" width="3" height="9" rx="1" fill="white" opacity="0.9"/>
        <rect x="11" y="2" width="3" height="12" rx="1" fill="white" opacity="0.9"/>
      </svg>
    </div>
    <div>
      <div class="logo-text">Reward Tracker</div>
      <div class="logo-sub">Prodigy Solutions — Coursework Rewards</div>
    </div>
  </div>
  <div class="header-right">
    <a id="github-link" class="version-badge" href="#" target="_blank" title="Open hosted version on GitHub Pages">

<script>
// ---------- GitHub Pages canonical URL ----------
// Update this once the repo is live. Anyone opening a local copy will see a banner
// prompting them to switch to the hosted version.
const GITHUB_PAGES_URL = 'https://wynnchance.github.io/reward-tracker/';

  if (isGithubPages) {

})();

// ---------- SharePoint REST wrapper with ETag-based optimistic concurrency ----------
const SP = (() => {
  const isHosted = window.location.hostname.includes('.sharepoint.com');

  function getSiteUrl() {
    const url = new URL(window.location.href);
    const parts = url.pathname.split('/').filter(Boolean);
    const siteIdx = parts.findIndex(p => p === 'sites' || p === 'teams');
    if (siteIdx !== -1 && parts[siteIdx + 1]) {
      return url.origin + '/' + parts.slice(0, siteIdx + 2).join('/');
    }
    return url.origin;
  }

  function getFileFolder() {
    const parts = new URL(window.location.href).pathname.split('/');
    parts.pop();
    return parts.join('/');
  }

  async function getDigest(siteUrl) {
    const r = await fetch(siteUrl + '/_api/contextinfo', {
      method: 'POST',
      headers: { 'Accept': 'application/json;odata=verbose' },
      credentials: 'include'
    });
    const d = await r.json();
    return d.d.GetContextWebInformation.FormDigestValue;
  }

  async function loadFile(filename) {
    if (!isHosted) return { data: null, etag: '' };
    try {
      const siteUrl = getSiteUrl();
      const folder = getFileFolder();
      const r = await fetch(
        siteUrl + `/_api/web/GetFileByServerRelativeUrl('${folder}/${filename}')/$value`,
        { credentials: 'include', headers: { 'Accept': 'text/plain' } }
      );
      if (r.ok) {
        const etag = r.headers.get('ETag') || r.headers.get('etag') || '';
        return { data: JSON.parse(await r.text()), etag };
      }
    } catch (err) {
      console.error('SharePoint load error:', filename, err);
    }
    return { data: null, etag: '' };
  }

  // Conditional save. If etag is provided, uses If-Match — a 412 response signals
  // "someone else wrote since you last read" so the caller can refresh and retry.
  // If etag is empty (first save), falls back to Files/Add which creates-or-overwrites.
  async function saveFile(filename, data, etag) {
    if (!isHosted) return { ok: false, reason: 'not-hosted', etag: '' };
    try {
      const siteUrl = getSiteUrl();
      const folder = getFileFolder();
      const digest = await getDigest(siteUrl);
      const body = JSON.stringify(data, null, 2);

      if (etag) {
        const r = await fetch(
          siteUrl + `/_api/web/GetFileByServerRelativeUrl('${folder}/${filename}')/$value`,
          {
            method: 'POST',
            credentials: 'include',
            headers: {
              'Accept': 'application/json;odata=verbose',
              'X-RequestDigest': digest,
              'X-HTTP-Method': 'PUT',
              'If-Match': etag
            },
            body
          }
        );
        if (r.status === 412) return { ok: false, reason: 'conflict', etag: '' };
        if (r.status === 404) {
          // File deleted out from under us — fall through to create
        } else if (!r.ok) {
          return { ok: false, reason: 'error', etag: '' };
        } else {
          const newEtag = r.headers.get('ETag') || r.headers.get('etag') || '';
          return { ok: true, etag: newEtag };
        }
      }

      const r2 = await fetch(
        siteUrl + `/_api/web/GetFolderByServerRelativeUrl('${folder}')/Files/Add(url='${filename}',overwrite=true)`,
        {
          method: 'POST',
          credentials: 'include',
          headers: {
            'Accept': 'application/json;odata=verbose',
            'X-RequestDigest': digest
          },
          body
        }
      );
      if (!r2.ok) return { ok: false, reason: 'error', etag: '' };
      const meta = await r2.json().catch(() => null);
      const newEtag = (meta && meta.d && meta.d['__metadata'] && meta.d['__metadata'].etag) || '';
      return { ok: true, etag: newEtag };
    } catch (err) {
      console.error('SharePoint save error:', filename, err);
      return { ok: false, reason: 'error', etag: '' };
    }
  }

  return { isHosted, loadFile, saveFile };
})();

// ---------- Local storage fallback ----------
const LOCAL_KEY = 'prodigy_reward_ledger_v4';
const FACILITY_KEY = 'prodigy_facility_data_v4';
const META_KEY = 'prodigy_reward_meta_v4';
const USER_KEY = 'prodigy_reward_current_user';
const DEFAULT_HOURS_PER_REWARD = 2;

function localLoad() {
  try { return JSON.parse(localStorage.getItem(LOCAL_KEY) || 'null'); } catch { return null; }
}
function localSave(ledger) {
  try { localStorage.setItem(LOCAL_KEY, JSON.stringify(ledger)); } catch {}
}
function localLoadFacilities() {
  try { return JSON.parse(localStorage.getItem(FACILITY_KEY) || 'null'); } catch { return null; }
}
function localSaveFacilities(fd) {
  try { localStorage.setItem(FACILITY_KEY, JSON.stringify(fd)); } catch {}
}
function localLoadMeta() {
  try { return JSON.parse(localStorage.getItem(META_KEY) || 'null'); } catch { return null; }
}
function localSaveMeta(meta) {
  try { localStorage.setItem(META_KEY, JSON.stringify(meta)); } catch {}
}

function setSyncStatus(stateClass, label) {
  const el = document.getElementById('sync-status');
  const lbl = document.getElementById('sync-label');
  if (!el || !lbl) return;
  el.className = stateClass;
  lbl.textContent = label;
}

// ---------- App state ----------
let state = {
  phase: 'upload',
  logsData: null,
  usersData: null,
  colMap: { username: '', facility: '', time: '' },
  usersColMap: { username: '', fullname: '' },
  inmates: [],
  facilityData: {},
  nameMap: {},
  ledger: {},
  meta: {
    lastServerSync: '',
    lastSavedBy: '',
    lastSavedAt: '',
    version: 1,
    nameMap: {},
    config: { hoursPerReward: DEFAULT_HOURS_PER_REWARD }
  },
  fileEtags: { ledger: '', facilityData: '', meta: '' },
  filter: 'ALL',
  search: '',
  sort: 'eligible',
  expanded: null,
  currentUser: ''
};

function getHoursPerReward() {
  const v = state.meta && state.meta.config && state.meta.config.hoursPerReward;
  return (typeof v === 'number' && v > 0) ? v : DEFAULT_HOURS_PER_REWARD;
}

// ---------- Normalizers ----------
function normalizeFacilityName(name) {
  return String(name || '').trim() || 'Unknown';
}

function ensureFacilityRecord(facilityName) {
  const name = normalizeFacilityName(facilityName);
  if (!state.facilityData[name] || typeof state.facilityData[name] !== 'object') {
    state.facilityData[name] = { inmates: [], updatedAt: '', updatedBy: '' };
  }
  if (!Array.isArray(state.facilityData[name].inmates)) {
    state.facilityData[name].inmates = [];
  }
  return state.facilityData[name];
}

function normalizeFacilityData() {
  const normalized = {};
  Object.keys(state.facilityData || {}).forEach(name => {
    const safeName = normalizeFacilityName(name);
    const rec = state.facilityData[name] || {};
    normalized[safeName] = {
      inmates: Array.isArray(rec.inmates) ? rec.inmates : [],
      updatedAt: rec.updatedAt || '',
      updatedBy: rec.updatedBy || ''
    };
  });
  state.facilityData = normalized;
}

function ensureRewardHistory(record) {
  if (!record.rewardHistory || !Array.isArray(record.rewardHistory)) {
    record.rewardHistory = [];
  }
  record.rewardHistory = record.rewardHistory
    .filter(x => x && typeof x === 'object' && x.appliedAt)
    .map(x => ({
      appliedAt: x.appliedAt,
      appliedBy: x.appliedBy || '',
      facility: normalizeFacilityName(x.facility || '')
    }));

  if (record.rewardHistory.length === 0 && record.rewarded > 0 && record.lastAppliedAt) {
    record.rewardHistory.push({
      appliedAt: record.lastAppliedAt,
      appliedBy: record.lastAppliedBy || '',
      facility: normalizeFacilityName(record.lastAppliedFacility || '')
    });
  }

  record.rewardHistory.sort((a, b) => new Date(a.appliedAt) - new Date(b.appliedAt));
  return record.rewardHistory;
}

function normalizeLedger() {
  const normalized = {};
  Object.keys(state.ledger || {}).forEach(username => {
    const rec = state.ledger[username] || {};
    normalized[username] = {
      rewarded: Number(rec.rewarded || 0),
      note: rec.note || '',
      claimedBy: rec.claimedBy || '',
      claimedAt: rec.claimedAt || '',
      lastApplied: rec.lastApplied || '',
      lastAppliedAt: rec.lastAppliedAt || '',
      lastAppliedBy: rec.lastAppliedBy || '',
      lastAppliedFacility: normalizeFacilityName(rec.lastAppliedFacility || ''),
      lastUndoBy: rec.lastUndoBy || '',
      lastUndoAt: rec.lastUndoAt || '',
      noteUpdatedBy: rec.noteUpdatedBy || '',
      noteUpdatedAt: rec.noteUpdatedAt || '',
      rewardHistory: Array.isArray(rec.rewardHistory) ? rec.rewardHistory : []
    };
    ensureRewardHistory(normalized[username]);
  });
  state.ledger = normalized;
}

function syncMetaNameMap() {
  if (!state.meta || typeof state.meta !== 'object') state.meta = {};
  if (!state.meta.nameMap || typeof state.meta.nameMap !== 'object') state.meta.nameMap = {};
  if (!state.meta.config || typeof state.meta.config !== 'object') {
    state.meta.config = { hoursPerReward: DEFAULT_HOURS_PER_REWARD };
  }
  state.nameMap = { ...state.meta.nameMap, ...state.nameMap };
  state.meta.nameMap = state.nameMap;
}

function flattenFacilities() {
  return Object.entries(state.facilityData).flatMap(([facilityName, rec]) =>
    (rec.inmates || []).map(i => ({
      ...i,
      facility: normalizeFacilityName(i.facility || facilityName)
    }))
  );
}

// ---------- Current user ----------
function getCurrentUser() {
  if (state.currentUser) return state.currentUser;
  try { state.currentUser = localStorage.getItem(USER_KEY) || ''; } catch {}
  return state.currentUser;
}

function setCurrentUserName(name) {
  const clean = String(name || '').trim();
  if (!clean) return false;
  state.currentUser = clean;
  try { localStorage.setItem(USER_KEY, clean); } catch {}
  return true;
}

function requireSignIn() {
  if (getCurrentUser()) return true;
  toast('Please sign in first');
  // Scroll the banner into view if it's there
  const banner = document.querySelector('.signin-banner');
  if (banner) banner.scrollIntoView({ behavior: 'smooth', block: 'center' });
  return false;
}

// ---------- Load / save ----------
function formatSavedDate(iso) {
  if (!iso) return 'Not saved yet';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return iso;
  return d.toLocaleString();
}

function getLastUpdatedText() {
  if (!state.meta.lastSavedAt && !state.meta.lastSavedBy) {
    return 'No shared save recorded yet.';
  }
  const by = state.meta.lastSavedBy || 'Unknown';
  const when = formatSavedDate(state.meta.lastSavedAt);
  return `Last updated by ${by} on ${when}`;
}

async function initLedger() {
  getCurrentUser();

  if (SP.isHosted) {
    setSyncStatus('saving', 'Connecting...');
    const [r1, r2, r3] = await Promise.all([
      SP.loadFile('reward_ledger.json'),
      SP.loadFile('facility_data.json'),
      SP.loadFile('reward_meta.json')
    ]);

    if (r1.data) state.ledger = r1.data;
    else { const local = localLoad(); if (local) state.ledger = local; }
    state.fileEtags.ledger = r1.etag;

    if (r2.data) state.facilityData = r2.data;
    else { const localFac = localLoadFacilities(); if (localFac) state.facilityData = localFac; }
    state.fileEtags.facilityData = r2.etag;

    if (r3.data) state.meta = r3.data;
    else { const localMeta = localLoadMeta(); if (localMeta) state.meta = localMeta; }
    state.fileEtags.meta = r3.etag;

    setSyncStatus('synced', 'Live — Shared system');
  } else {
    const local = localLoad();
    if (local) state.ledger = local;
    const localFac = localLoadFacilities();
    if (localFac) state.facilityData = localFac;
    const localMeta = localLoadMeta();
    if (localMeta) state.meta = localMeta;
    setSyncStatus('local', 'Offline mode');
  }

  normalizeFacilityData();
  normalizeLedger();
  syncMetaNameMap();
  state.inmates = flattenFacilities();

  state.phase = (state.inmates.length > 0 || Object.keys(state.facilityData || {}).length > 0)
    ? 'dashboard'
    : 'upload';

  render();
}

async function refreshFromServer() {
  if (!SP.isHosted) return true;

  try {
    setSyncStatus('saving', 'Refreshing...');
    const [r1, r2, r3] = await Promise.all([
      SP.loadFile('reward_ledger.json'),
      SP.loadFile('facility_data.json'),
      SP.loadFile('reward_meta.json')
    ]);

    if (r1.data) state.ledger = r1.data;
    state.fileEtags.ledger = r1.etag;
    if (r2.data) state.facilityData = r2.data;
    state.fileEtags.facilityData = r2.etag;
    if (r3.data) state.meta = r3.data;
    state.fileEtags.meta = r3.etag;

    normalizeFacilityData();
    normalizeLedger();
    syncMetaNameMap();
    state.inmates = flattenFacilities();

    setSyncStatus('synced', 'Live — Shared system');
    return true;
  } catch (err) {
    console.error('refreshFromServer error', err);
    setSyncStatus('error', 'Refresh failed');
    return false;
  }
}

// Saves all three ledger files. Returns { ok, reason }.
// reason='conflict' means a peer wrote since our last load — caller should refresh + retry.
async function persistAll() {
  const user = getCurrentUser() || 'Unknown';

  normalizeFacilityData();
  normalizeLedger();
  syncMetaNameMap();

  state.meta = {
    ...state.meta,
    nameMap: state.nameMap,
    lastSavedBy: user,
    lastSavedAt: new Date().toISOString(),
    version: (state.meta.version || 1) + 1
  };

  if (SP.isHosted) {
    setSyncStatus('saving', 'Saving...');

    const [r1, r2, r3] = await Promise.all([
      SP.saveFile('reward_ledger.json', state.ledger, state.fileEtags.ledger),
      SP.saveFile('facility_data.json', state.facilityData, state.fileEtags.facilityData),
      SP.saveFile('reward_meta.json', state.meta, state.fileEtags.meta)
    ]);

    if (r1.reason === 'conflict' || r2.reason === 'conflict' || r3.reason === 'conflict') {
      // Keep whatever etags came back (some files may have succeeded — we'll re-load anyway)
      setSyncStatus('error', 'Conflict — refreshing');
      return { ok: false, reason: 'conflict' };
    }

    localSave(state.ledger);
    localSaveFacilities(state.facilityData);
    localSaveMeta(state.meta);

    if (!r1.ok || !r2.ok || !r3.ok) {
      setSyncStatus('error', 'Save failed — local backup used');
      return { ok: false, reason: 'error' };
    }

    state.fileEtags.ledger = r1.etag || state.fileEtags.ledger;
    state.fileEtags.facilityData = r2.etag || state.fileEtags.facilityData;
    state.fileEtags.meta = r3.etag || state.fileEtags.meta;

    setSyncStatus('synced', 'Live — Shared system');
    return { ok: true };
  }

  localSave(state.ledger);
  localSaveFacilities(state.facilityData);
  localSaveMeta(state.meta);
  setSyncStatus('local', 'Offline mode');
  return { ok: true };
}

// Wraps a mutation in a refresh-retry loop. The actionFn is a closure that
// mutates state.ledger / state.facilityData and returns { ok, message, ... }.
// On save-conflict, we refresh from the server and re-run the action against
// fresh state, so concurrent edits merge cleanly instead of clobbering.
async function performAction(actionFn) {
  const MAX_RETRIES = 3;

  for (let attempt = 0; attempt < MAX_RETRIES; attempt++) {
    const result = actionFn();
    if (!result || !result.ok) {
      return result || { ok: false, message: 'Action failed' };
    }

    const saveResult = await persistAll();
    if (saveResult.ok) {
      return { ...result, merged: attempt > 0 };
    }
    if (saveResult.reason !== 'conflict') {
      return { ok: false, message: 'Save failed — your changes are stored locally as a backup' };
    }

    const refreshed = await refreshFromServer();
    if (!refreshed) {
      return { ok: false, message: 'Conflict detected and refresh failed' };
    }
    // Loop: actionFn re-runs against fresh state
  }
  return { ok: false, message: 'Could not save after several attempts — please refresh' };
}

// ---------- CSV parsing (handles multi-line quoted fields) ----------
function parseCSV(text) {
  const rows = [];
  let row = [];
  let current = '';
  let inQuotes = false;

  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    const next = text[i + 1];

    if (ch === '"' && inQuotes && next === '"') {
      current += '"';
      i++;
    } else if (ch === '"') {
      inQuotes = !inQuotes;
    } else if (ch === ',' && !inQuotes) {
      row.push(current);
      current = '';
    } else if ((ch === '\n' || ch === '\r') && !inQuotes) {
      if (ch === '\r' && next === '\n') i++;
      row.push(current);
      if (row.some(c => c.trim())) rows.push(row);
      row = [];
      current = '';
    } else {
      current += ch;
    }
  }

  if (current !== '' || row.length) {
    row.push(current);
    if (row.some(c => c.trim())) rows.push(row);
  }

  if (rows.length < 2) return { headers: [], rows: [] };

  const headers = rows[0].map(h => h.trim());
  const dataRows = rows.slice(1).map(values => {
    const obj = {};
    for (let i = 0; i < headers.length; i++) {
      obj[headers[i]] = (values[i] ?? '').trim();
    }
    return obj;
  });

  return { headers, rows: dataRows };
}

function detectLogsCols(headers) {
  const h = headers.map(x => x.toLowerCase().replace(/[^a-z]/g, ''));
  const find = (...terms) => {
    for (const t of terms) {
      const i = h.findIndex(x => x.includes(t));
      if (i !== -1) return headers[i];
    }
    return '';
  };
  return {
    username: find('username', 'learner', 'user', 'inmate', 'student'),
    facility: find('facilityname', 'facility', 'location', 'site'),
    time: find('timespentsec', 'timespent', 'time', 'duration', 'seconds')
  };
}

function detectUsersCols(headers) {
  const h = headers.map(x => x.toLowerCase().replace(/[^a-z]/g, ''));
  const find = (...terms) => {
    for (const t of terms) {
      const i = h.findIndex(x => x.includes(t));
      if (i !== -1) return headers[i];
    }
    return '';
  };
  return {
    username: find('usernameusername', 'username', 'user'),
    fullname: find('fullnamefull', 'fullname', 'name')
  };
}

// ---------- Formatting helpers ----------
function fmtTime(secs) {
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  if (h === 0 && m === 0) return '< 1m';
  if (h === 0) return m + 'm';
  if (m === 0) return h + 'h 0m';
  return h + 'h ' + m + 'm';
}

function fmtHrs(hrs) {
  return hrs.toFixed(2) + 'h';
}

function nameFor(u) {
  return state.nameMap[u] || state.nameMap[String(u)] || '';
}

function displayName(u) {
  return nameFor(u) || u;
}

function getLedgerRecord(username) {
  if (!state.ledger[username]) {
    state.ledger[username] = {
      rewarded: 0,
      note: '',
      claimedBy: '',
      claimedAt: '',
      lastApplied: '',
      lastAppliedAt: '',
      lastAppliedBy: '',
      lastAppliedFacility: '',
      rewardHistory: []
    };
  }
  ensureRewardHistory(state.ledger[username]);
  return state.ledger[username];
}

function getStats(inmate) {
  const hpr = getHoursPerReward();
  const totalHours = inmate.totalSecs / 3600;
  const rec = getLedgerRecord(inmate.username);
  const rewarded = rec.rewarded || 0;
  const hoursApplied = rewarded * hpr;
  const banked = Math.max(totalHours - hoursApplied, 0);
  const eligible = Math.floor(banked / hpr);
  const remainder = banked % hpr;
  const hoursUntilNext = eligible > 0 ? 0 : (hpr - remainder || hpr);
  const pct = Math.min((remainder / hpr) * 100, 100);

  return {
    totalHours,
    rewarded,
    hoursApplied,
    banked,
    eligible,
    hoursUntilNext,
    pct,
    note: rec.note || '',
    lastApplied: rec.lastApplied || '',
    lastAppliedBy: rec.lastAppliedBy || '',
    claimedBy: rec.claimedBy || '',
    claimedAt: rec.claimedAt || '',
    rewardHistory: rec.rewardHistory || []
  };
}

function getProcessed() {
  return state.inmates
    .map(i => ({ ...i, stats: getStats(i) }))
    .filter(i => {
      const facilityMatch = state.filter === 'ALL' || i.facility === state.filter;
      const q = state.search.toLowerCase();
      const searchMatch =
        !q ||
        i.username.toLowerCase().includes(q) ||
        (nameFor(i.username) || '').toLowerCase().includes(q) ||
        i.facility.toLowerCase().includes(q);
      return facilityMatch && searchMatch;
    })
    .sort((a, b) => {
      if (state.sort === 'eligible') {
        return b.stats.eligible - a.stats.eligible || b.stats.banked - a.stats.banked;
      }
      if (state.sort === 'hours') {
        return b.stats.totalHours - a.stats.totalHours;
      }
      return displayName(a.username).localeCompare(displayName(b.username));
    });
}

// ---------- Toast ----------
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  if (!el) return;
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// Comprehensive verification export. Downloads two CSVs:
//   1. Summary — one row per inmate with the raw seconds from Kolibri AND
//      every calculated field, so you can spot anomalies (sort by Total Hours
//      in Excel — if anyone shows thousands of hours, the import data is bad).
//   2. History — one row per reward event so you can verify reward counts
//      are accurate and trace who applied what when.
function exportAudit() {
  const hpr = getHoursPerReward();
  const dateStr = today();

  // ---- Summary ----
  const summaryRows = [[
    'Full Name', 'Username', 'Facility',
    'Total Seconds (raw)', 'Total Hours',
    'Rewards Applied', 'Hours Applied', 'Banked Hours',
    'Rewards Available', 'Hours Until Next', 'Hours Per Reward',
    'Last Applied At', 'Last Applied By', 'Last Applied Facility',
    'Claimed By', 'Claimed At',
    'Note', 'Note Updated By', 'Note Updated At',
    'Last Undo By', 'Last Undo At',
    'Facility Last Imported At', 'Facility Last Imported By'
  ]];

  const allInmates = flattenFacilities()
    .map(i => ({ ...i, stats: getStats(i) }))
    .sort((a, b) => {
      if (a.facility !== b.facility) return a.facility.localeCompare(b.facility);
      return (nameFor(a.username) || a.username)
        .localeCompare(nameFor(b.username) || b.username);
    });

  allInmates.forEach(i => {
    const s = i.stats;
    const rec = getLedgerRecord(i.username);
    const facRec = state.facilityData[i.facility] || {};
    summaryRows.push([
      nameFor(i.username) || i.username,
      i.username,
      i.facility,
      i.totalSecs,
      s.totalHours.toFixed(4),
      s.rewarded,
      (s.rewarded * hpr).toFixed(2),
      s.banked.toFixed(4),
      s.eligible,
      s.hoursUntilNext.toFixed(2),
      hpr,
      rec.lastAppliedAt || '',
      rec.lastAppliedBy || '',
      rec.lastAppliedFacility || '',
      rec.claimedBy || '',
      rec.claimedAt || '',
      rec.note || '',
      rec.noteUpdatedBy || '',
      rec.noteUpdatedAt || '',
      rec.lastUndoBy || '',
      rec.lastUndoAt || '',
      facRec.updatedAt || '',
      facRec.updatedBy || ''
    ]);
  });

  // ---- Reward history ----
  const historyRows = [[
    'Full Name', 'Username', 'Current Facility',
    'Applied At', 'Applied By', 'Applied At Facility'
  ]];

  const historyEntries = [];
  Object.entries(state.ledger).forEach(([username, rec]) => {
    if (!rec.rewardHistory) return;
    const inmate = state.inmates.find(x => x.username === username);
    const currentFacility = inmate ? inmate.facility : '(not in current data)';
    rec.rewardHistory.forEach(entry => {
      historyEntries.push({
        username,
        name: nameFor(username) || username,
        currentFacility,
        appliedAt: entry.appliedAt || '',
        appliedBy: entry.appliedBy || '',
        appliedFacility: entry.facility || ''
      });
    });
  });

  historyEntries
    .sort((a, b) => {
      const ta = new Date(a.appliedAt).getTime() || 0;
      const tb = new Date(b.appliedAt).getTime() || 0;
      return tb - ta;  // most recent first
    })
    .forEach(e => {
      historyRows.push([
        e.name,
        e.username,
        e.currentFacility,
        e.appliedAt,
        e.appliedBy,
        e.appliedFacility
      ]);
    });

  downloadCSV(summaryRows, 'audit_summary_' + dateStr + '.csv');
  // Small delay so the browser doesn't suppress the second download.
  setTimeout(() => downloadCSV(historyRows, 'audit_history_' + dateStr + '.csv'), 250);

  toast('Audit exports downloaded (' + allInmates.length + ' inmates, ' +
    historyEntries.length + ' reward events) — open in Excel to verify');
}

function exportLedger() {
  const backup = {
    ledger: state.ledger,
    facilityData: state.facilityData,
    meta: state.meta
  };
  const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'reward_ledger_backup_' + today() + '.json';
  a.click();
  toast('Ledger backup downloaded');
}

function importLedger() {
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = '.json';
  inp.addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (typeof data !== 'object' || Array.isArray(data)) throw new Error();

        const result = await performAction(() => {
          if (data.ledger && data.facilityData) {
            state.ledger = data.ledger;
            state.facilityData = data.facilityData;
            state.meta = data.meta || state.meta;
          } else {
            state.ledger = data;
          }
          normalizeFacilityData();
          normalizeLedger();
          syncMetaNameMap();
          state.inmates = flattenFacilities();
          state.phase = state.inmates.length > 0 ? 'dashboard' : 'upload';
          return { ok: true, message: 'Backup restored' };
        });

        toast(result.message);
        render();
      } catch {
        toast('Error: invalid backup file');
      }
    };
    reader.readAsText(file);
  });
  inp.click();
}

function downloadCSV(rows, filename) {
  const csv = rows
    .map(r => r.map(c => '"' + String(c).replace(/"/g, '""') + '"').join(','))
    .join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}

function today() {
  return new Date().toISOString().slice(0, 10);
}

// ---------- Mutations (intent-based, conflict-safe) ----------
async function claimInmate(username) {
  if (!requireSignIn()) return;
  const user = getCurrentUser();

  const result = await performAction(() => {
    const rec = getLedgerRecord(username);
    if (rec.claimedBy && rec.claimedBy !== user) {
      return { ok: false, message: 'Already claimed by ' + rec.claimedBy };
    }
    state.ledger[username] = { ...rec, claimedBy: user, claimedAt: new Date().toISOString() };
    return { ok: true, message: 'Claimed — ' + displayName(username) };
  });

  toast(result.message);
  render();
}

async function unclaimInmate(username) {
  if (!requireSignIn()) return;
  const user = getCurrentUser();

  const result = await performAction(() => {
    const rec = getLedgerRecord(username);
    if (rec.claimedBy && rec.claimedBy !== user) {
      return { ok: false, message: 'Only ' + rec.claimedBy + ' can unclaim this' };
    }
    state.ledger[username] = { ...rec, claimedBy: '', claimedAt: '' };
    return { ok: true, message: 'Unclaimed — ' + displayName(username) };
  });

  toast(result.message);
  render();
}

async function applyReward(username) {
  if (!requireSignIn()) return;
  const user = getCurrentUser();

  const result = await performAction(() => {
    const inmate = state.inmates.find(i => i.username === username);
    if (!inmate) return { ok: false, message: 'Inmate not found' };

    const rec = getLedgerRecord(username);
    if (rec.claimedBy && rec.claimedBy !== user) {
      return { ok: false, message: 'Claimed by ' + rec.claimedBy };
    }

    const stats = getStats(inmate);
    if (stats.eligible <= 0) return { ok: false, message: 'No longer eligible' };

    const nowIso = new Date().toISOString();
    state.ledger[username] = {
      ...rec,
      rewarded: (rec.rewarded || 0) + 1,
      lastApplied: new Date().toLocaleDateString(),
      lastAppliedAt: nowIso,
      lastAppliedBy: user,
      lastAppliedFacility: inmate.facility,
      claimedBy: '',
      claimedAt: '',
      rewardHistory: [
        ...(rec.rewardHistory || []),
        { appliedAt: nowIso, appliedBy: user, facility: inmate.facility }
      ]
    };

    return { ok: true, message: 'Reward applied — ' + displayName(username) };
  });

  toast(result.message + (result.merged ? ' (merged with another save)' : ''));
  render();
}

async function undoReward(username) {
  if (!requireSignIn()) return;
  const user = getCurrentUser();

  const result = await performAction(() => {
    const rec = getLedgerRecord(username);
    if (!rec.rewarded || rec.rewarded <= 0) {
      return { ok: false, message: 'No reward to undo' };
    }
    if (rec.claimedBy && rec.claimedBy !== user) {
      return { ok: false, message: 'Claimed by ' + rec.claimedBy };
    }

    const newHistory = [...(rec.rewardHistory || [])];
    newHistory.pop();
    const lastEntry = newHistory.length ? newHistory[newHistory.length - 1] : null;

    state.ledger[username] = {
      ...rec,
      rewarded: rec.rewarded - 1,
      rewardHistory: newHistory,
      lastAppliedAt: lastEntry ? lastEntry.appliedAt : '',
      lastAppliedBy: lastEntry ? (lastEntry.appliedBy || '') : '',
      lastAppliedFacility: lastEntry ? (lastEntry.facility || '') : '',
      lastApplied: lastEntry ? new Date(lastEntry.appliedAt).toLocaleDateString() : '',
      lastUndoBy: user,
      lastUndoAt: new Date().toISOString()
    };

    return { ok: true, message: 'Reward undone — ' + displayName(username) };
  });

  toast(result.message);
  render();
}

async function saveNote(username) {
  if (!requireSignIn()) return;
  const user = getCurrentUser();

  const ta = document.getElementById('note-' + safeId(username));
  if (!ta) return;
  const noteText = ta.value;

  const result = await performAction(() => {

      noteUpdatedBy: user,
      noteUpdatedAt: new Date().toISOString()

    return { ok: true, message: 'Note saved' };
  });

  toast(result.message);
}

// ---------- Bulk apply (with Kinetic checklist) ----------
// mode is '1', '2', or 'all'
async function executeBulkApply(targets, mode) {
  if (!requireSignIn()) return;
  const user = getCurrentUser();

  const result = await performAction(() => {
    const applied = [];
    const skipped = [];
    let total = 0;

    for (const username of targets) {
      const inmate = state.inmates.find(i => i.username === username);
      if (!inmate) { skipped.push({ username, reason: 'not found' }); continue; }

      const rec = getLedgerRecord(username);
      if (rec.claimedBy && rec.claimedBy !== user) {
        skipped.push({ username, reason: 'claimed by ' + rec.claimedBy });
        continue;
      }

      const stats = getStats(inmate);
      const desired = mode === 'all' ? stats.eligible : (parseInt(mode, 10) || 1);
      const actual = Math.min(desired, stats.eligible);
      if (actual <= 0) { skipped.push({ username, reason: 'not eligible' }); continue; }

      const nowIso = new Date().toISOString();
      const newHistory = [...(rec.rewardHistory || [])];
      for (let i = 0; i < actual; i++) {
        newHistory.push({ appliedAt: nowIso, appliedBy: user, facility: inmate.facility });
      }

      state.ledger[username] = {
        ...rec,
        rewarded: (rec.rewarded || 0) + actual,
        lastApplied: new Date().toLocaleDateString(),
        lastAppliedAt: nowIso,
        lastAppliedBy: user,
        lastAppliedFacility: inmate.facility,
        claimedBy: '',
        claimedAt: '',
        rewardHistory: newHistory
      };

      applied.push({ username, count: actual, facility: inmate.facility, name: nameFor(username) || username });
      total += actual;
    }

    if (applied.length === 0) {
      return { ok: false, message: 'Nothing applied. ' + skipped.length + ' skipped.' };
    }

    let msg = `Applied ${total} reward${total !== 1 ? 's' : ''} across ${applied.length} inmate${applied.length !== 1 ? 's' : ''}`;
    if (skipped.length) msg += ` · ${skipped.length} skipped`;

    return { ok: true, message: msg, applied, skipped, total };
  });

  if (result.ok) {
    toast(result.message + (result.merged ? ' (merged)' : ''));
    openKineticChecklist(result.applied, result.total);
    closeModal();
    render();
  } else {
    toast(result.message);
  }
}

function openKineticChecklist(applied, total) {
  const html = buildKineticChecklistHTML(applied, total);
  const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
  const blobUrl = URL.createObjectURL(blob);

  // Open the styled checklist in a new tab. The popup has a "Save copy"
  // button if the user wants a file on disk — we no longer auto-download.
  const win = window.open(blobUrl, '_blank');
  if (!win) {
    // Popup was blocked — fall back to a one-shot download so the user
    // still gets the file.
    const a = document.createElement('a');
    a.href = blobUrl;
    a.download = 'kinetic_rewards_' + today() + '.html';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    toast('Popup blocked — file downloaded instead.');
  }

  setTimeout(() => URL.revokeObjectURL(blobUrl), 60000);
}

// ---------- CSV upload processing ----------
function autoProcess() {
  const detected = detectLogsCols(state.logsData.headers);
  if (!detected.username || !detected.time) {
    state.colMap = detected;
    state.phase = 'map';
    render();
    toast('Could not detect columns automatically — please map them manually');
    return;
  }
  state.colMap = detected;
  if (state.usersData) {
    state.usersColMap = detectUsersCols(state.usersData.headers);
  }
  processCSV();
}

async function processCSV() {
  if (!requireSignIn()) return;
  const user = getCurrentUser();

  const result = await performAction(() => {
    const newNameMap = {};
    if (state.usersData && state.usersColMap.username && state.usersColMap.fullname) {
      state.usersData.rows.forEach(row => {
        const u = String(row[state.usersColMap.username] || '').trim();
        const n = String(row[state.usersColMap.fullname] || '').trim();
        if (u && n) newNameMap[u] = n;
      });
    }

    const grouped = {};
    const facilitiesInThisCSV = new Set();

    state.logsData.rows.forEach(row => {
      const username = String(row[state.colMap.username] || '').trim();
      const facility = state.colMap.facility
        ? normalizeFacilityName(row[state.colMap.facility] || 'Unknown')
        : 'Unknown';
      const secs = parseFloat(row[state.colMap.time] || 0) || 0;
      if (!username) return;
      facilitiesInThisCSV.add(facility);
      if (!grouped[username]) {
        grouped[username] = { username, facility, totalSecs: 0 };
      }
      grouped[username].totalSecs += secs;
    });

    facilitiesInThisCSV.forEach(fac => {
      const inmates = Object.values(grouped).filter(i => i.facility === fac);
      const existing = ensureFacilityRecord(fac);
      state.facilityData[fac] = {
        ...existing,
        inmates,
        updatedAt: new Date().toLocaleDateString(),
        updatedBy: user
      };
    });

    state.nameMap = { ...state.nameMap, ...newNameMap };
    state.meta.nameMap = state.nameMap;
    state.inmates = flattenFacilities();

    return { ok: true, message: 'Processed ' + state.logsData.rows.length + ' rows' };
  });

  if (result.ok) {
    toast(result.message);
    state.phase = 'dashboard';
    render();
  } else {
    toast(result.message);
  }
}

function handleFile(file, type) {
  if (!file || !file.name.toLowerCase().endsWith('.csv')) {
    toast('Please upload a CSV file');
    return;
  }
  const reader = new FileReader();
  reader.onload = e => {
    const parsed = parseCSV(e.target.result);
    if (type === 'logs') state.logsData = parsed;
    else state.usersData = parsed;
    render();
  };
  reader.readAsText(file);
}

function setupDrop(zoneId, type) {
  const zone = document.getElementById(zoneId);
  if (!zone) return;
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('drag-over');
    handleFile(e.dataTransfer.files[0], type);
  });
  zone.addEventListener('click', () => {
    const input = document.getElementById(type + '-input');
    if (input) input.click();
  });
  const inp = document.getElementById(type + '-input');
  if (inp) inp.addEventListener('change', e => handleFile(e.target.files[0], type));
}

function safeId(val) {
  return String(val).replace(/[^a-zA-Z0-9_-]/g, '_');
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => (
    { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
  ));
}

// ---------- DOM helpers ----------
function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) {
    for (const [k, v] of Object.entries(attrs)) {
      if (k === 'class') el.className = v;
      else if (k.startsWith('on')) el.addEventListener(k.slice(2), v);
      else if (k === 'value') el.value = v;
      else el.setAttribute(k, v);
    }
  }
  for (const c of children.flat()) {
    if (c == null) continue;
    el.append(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return el;
}

const SVG_NS = 'http://www.w3.org/2000/svg';
function svgEl(tag, attrs) {
  const el = document.createElementNS(SVG_NS, tag);
  if (attrs) for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, String(v));
  return el;
}
function svgRoot(attrs, ...children) {
  const root = svgEl('svg', attrs);
  children.flat().forEach(c => c && root.append(c));
  return root;
}

// ---------- Modals ----------
let modalEl = null;
function openModal(builder, { wide = false } = {}) {
  closeModal();
  const overlay = h('div', { class: 'modal-overlay' });
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
  const modal = h('div', { class: 'modal' + (wide ? ' modal-wide' : '') });
  modal.append(builder(closeModal));
  overlay.append(modal);
  document.body.append(overlay);
  modalEl = overlay;
  document.addEventListener('keydown', onEscClose);
}
function closeModal() {
  if (modalEl) { modalEl.remove(); modalEl = null; }
  document.removeEventListener('keydown', onEscClose);
}
function onEscClose(e) { if (e.key === 'Escape') closeModal(); }

function openBulkApplyModal() {
  if (!requireSignIn()) return;
  const user = getCurrentUser();

  function isEligibleForUser(inmate) {
    const stats = getStats(inmate);
    return stats.eligible > 0 && (!stats.claimedBy || stats.claimedBy === user);
  }

  // Pre-count eligible inmates per facility so the dropdown can show counts
  // and we can decide a smart default.
  const eligibleByFacility = {};
  state.inmates.forEach(i => {
    if (!isEligibleForUser(i)) return;
    eligibleByFacility[i.facility] = (eligibleByFacility[i.facility] || 0) + 1;
  });
  const facilitiesWithEligible = Object.keys(eligibleByFacility).sort();

  if (facilitiesWithEligible.length === 0) {
    toast('No eligible inmates');
    return;
  }

  // Default to the dashboard's current facility filter if it has eligibles,
  // otherwise fall back to ALL so the modal is never empty on open.
  let facilityFilter =
    (state.filter && eligibleByFacility[state.filter]) ? state.filter : 'ALL';
  let mode = '1';
  // Selections are keyed by username and persist across facility switches,
  // but Apply only acts on inmates visible in the current facility view.
  const selections = new Map();

  function getVisibleEligible() {
    return state.inmates
      .map(i => ({ ...i, stats: getStats(i) }))
      .filter(isEligibleForUser)
      .filter(i => facilityFilter === 'ALL' || i.facility === facilityFilter)
      .sort((a, b) => {
        if (a.facility !== b.facility) return a.facility.localeCompare(b.facility);
        return (nameFor(a.username) || a.username)
          .localeCompare(nameFor(b.username) || b.username);
      });
  }

  openModal(close => {
    const summaryEl = h('div', { class: 'modal-footer-info' });
    const listEl = h('div', { class: 'bulk-list' });
    const headerInfoEl = h('div', {});

    function applyCountFor(inmate) {
      if (mode === 'all') return inmate.stats.eligible;
      return Math.min(parseInt(mode, 10) || 1, inmate.stats.eligible);
    }
    function selectedCount() {
      return getVisibleEligible().filter(i => selections.get(i.username)).length;
    }
    function totalRewards() {
      return getVisibleEligible()
        .filter(i => selections.get(i.username))
        .reduce((sum, i) => sum + applyCountFor(i), 0);
    }
    function updateSummary() {
      const t = totalRewards();
      const c = selectedCount();
      summaryEl.textContent = t + ' reward' + (t !== 1 ? 's' : '') +
        ' across ' + c + ' inmate' + (c !== 1 ? 's' : '');
    }

    function rebuildList() {
      const eligible = getVisibleEligible();

      // Default any newly-visible inmate to checked; preserve prior toggles.
      eligible.forEach(i => {
        if (!selections.has(i.username)) selections.set(i.username, true);
      });

      headerInfoEl.textContent = eligible.length + ' eligible inmate' +
        (eligible.length !== 1 ? 's' : '');
      listEl.innerHTML = '';

      if (eligible.length === 0) {
        listEl.append(h('div', {
          style: 'padding: 32px; text-align: center; color: var(--text-muted);'
        },
          h('div', { style: 'font-weight: 600; margin-bottom: 4px;' },
            'No eligible inmates here'),
          h('div', { style: 'font-size: 12px;' },
            'Try a different facility.')
        ));
        updateSummary();
        return;
      }

      const byFacility = {};
      eligible.forEach(i => {
        if (!byFacility[i.facility]) byFacility[i.facility] = [];
        byFacility[i.facility].push(i);
      });

      Object.keys(byFacility).sort().forEach(fac => {
        listEl.append(h('div', { class: 'bulk-facility' },
          fac + ' (' + byFacility[fac].length + ')'));
        byFacility[fac].forEach(inmate => {
          const cb = h('input', { type: 'checkbox' });
          cb.checked = selections.get(inmate.username);
          cb.addEventListener('change', () => {
            selections.set(inmate.username, cb.checked);
            updateSummary();
          });
          const rewardsLabel = h('span', { class: 'bulk-item-rewards' });
          function updateRewardsLabel() {
            const count = applyCountFor(inmate);
            rewardsLabel.textContent = count + ' reward' + (count !== 1 ? 's' : '');
          }
          updateRewardsLabel();
          rewardsLabel._update = updateRewardsLabel;
          listEl.append(h('div', { class: 'bulk-item' },
            cb,
            h('div', { class: 'bulk-item-name' },
              (nameFor(inmate.username) || inmate.username),
              h('span', { class: 'bulk-item-uname' }, inmate.username)
            ),
            rewardsLabel
          ));
        });
      });
      updateSummary();
    }

    function refreshAllRewardLabels() {
      listEl.querySelectorAll('.bulk-item-rewards')
        .forEach(el => el._update && el._update());
      updateSummary();
    }

    // Facility dropdown — only lists facilities that actually have eligibles.
    const facilitySelect = h('select');
    const totalEligible = facilitiesWithEligible.reduce(
      (s, f) => s + eligibleByFacility[f], 0
    );
    const allOpt = document.createElement('option');
    allOpt.value = 'ALL';
    allOpt.textContent = 'All facilities (' + totalEligible + ')';
    if (facilityFilter === 'ALL') allOpt.selected = true;
    facilitySelect.append(allOpt);
    facilitiesWithEligible.forEach(fac => {
      const o = document.createElement('option');
      o.value = fac;
      o.textContent = fac + ' (' + eligibleByFacility[fac] + ')';
      if (fac === facilityFilter) o.selected = true;
      facilitySelect.append(o);
    });
    facilitySelect.addEventListener('change', () => {
      facilityFilter = facilitySelect.value;
      rebuildList();
    });

    const radioOne = h('input', { type: 'radio', name: 'bulk-mode', value: '1' });
    const radioTwo = h('input', { type: 'radio', name: 'bulk-mode', value: '2' });
    const radioAll = h('input', { type: 'radio', name: 'bulk-mode', value: 'all' });
    radioOne.checked = true;
    radioOne.addEventListener('change', () => { if (radioOne.checked) { mode = '1'; refreshAllRewardLabels(); } });
    radioTwo.addEventListener('change', () => { if (radioTwo.checked) { mode = '2'; refreshAllRewardLabels(); } });
    radioAll.addEventListener('change', () => { if (radioAll.checked) { mode = 'all'; refreshAllRewardLabels(); } });

    const selectAll = h('button', { class: 'btn-sm btn-ghost' }, 'Select all');
    const selectNone = h('button', { class: 'btn-sm btn-ghost' }, 'Clear');
    selectAll.addEventListener('click', () => {
      getVisibleEligible().forEach(i => selections.set(i.username, true));
      listEl.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = true);
      updateSummary();
    });
    selectNone.addEventListener('click', () => {
      getVisibleEligible().forEach(i => selections.set(i.username, false));
      listEl.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
      updateSummary();
    });

    const apply = h('button', { class: 'btn-primary' }, 'Apply & open checklist');
    apply.addEventListener('click', () => {
      const targets = getVisibleEligible()
        .filter(i => selections.get(i.username))
        .map(i => i.username);
      if (targets.length === 0) { toast('Select at least one inmate'); return; }
      executeBulkApply(targets, mode);
    });

    rebuildList();

    return h('div', {},
      h('h2', {}, 'Bulk apply rewards'),
      h('p', { class: 'modal-subtitle' },
        'Marks rewards as applied in the tracker AND opens a styled checklist for kineticconsole.com.'
      ),
      h('div', {
        style: 'display:flex;align-items:center;gap:10px;margin-bottom:10px;font-size:13px;'
      },
        h('span', { style: 'color:var(--text-muted);' }, 'Facility:'),
        facilitySelect
      ),
      h('div', { class: 'bulk-radio-row' },
        h('label', {}, radioOne, h('span', {}, 'Apply 1 per inmate')),
        h('label', {}, radioTwo, h('span', {}, 'Apply 2 per inmate')),
        h('label', {}, radioAll, h('span', {}, 'Apply all eligible'))
      ),
      h('div', { class: 'bulk-toolbar' },
        headerInfoEl,
        h('div', { style: 'display:flex;gap:4px;' }, selectAll, selectNone)
      ),
      h('div', { class: 'modal-body' }, listEl),
      h('div', { class: 'modal-footer' },
        summaryEl,
        h('button', { onclick: close }, 'Cancel'),
        apply
      )
    );
  }, { wide: true });
}

// Build a checklist from rewards the current user has already applied in the
// tracker — for the manual-apply workflow where rewards trickle in one at a
// time and the user wants a single doc to take to Kinetic at the end.
function openExportChecklistModal() {
  if (!requireSignIn()) return;
  const user = getCurrentUser();

  // -1 = all time, 0 = today only, N = last N days
  let windowDays = 0;

  function getEntries() {
    let cutoff;
    if (windowDays === -1) {
      cutoff = 0;
    } else if (windowDays === 0) {
      const d = new Date();
      d.setHours(0, 0, 0, 0);
      cutoff = d.getTime();
    } else {
      cutoff = Date.now() - windowDays * 86400000;
    }

    const entries = [];
    Object.entries(state.ledger).forEach(([username, rec]) => {
      if (!rec.rewardHistory) return;
      const recent = rec.rewardHistory.filter(e => {
        const t = new Date(e.appliedAt).getTime();
        return !isNaN(t) && t >= cutoff && e.appliedBy === user;
      });
      if (recent.length === 0) return;

      const byFacility = {};
      recent.forEach(e => {
        const fac = e.facility || 'Unknown';
        byFacility[fac] = (byFacility[fac] || 0) + 1;
      });

      Object.entries(byFacility).forEach(([fac, count]) => {
        entries.push({
          username,
          name: nameFor(username) || username,
          facility: fac,
          count
        });
      });
    });

    return entries;
  }

  function entryKey(e) { return e.username + '|' + e.facility; }

  const selections = new Map();

  openModal(close => {
    const summaryEl = h('div', { class: 'modal-footer-info' });
    const listEl = h('div', { class: 'bulk-list' });

    function selectedTotal() {
      let total = 0;
      let count = 0;
      getEntries().forEach(e => {
        if (selections.get(entryKey(e))) {
          total += e.count;
          count += 1;
        }
      });
      return { total, count };
    }
    function updateSummary() {
      const { total, count } = selectedTotal();
      summaryEl.textContent = total + ' reward' + (total !== 1 ? 's' : '') +
        ' across ' + count + ' inmate' + (count !== 1 ? 's' : '');
    }

    function rebuildList() {
      const entries = getEntries();
      entries.forEach(e => {
        const k = entryKey(e);
        if (!selections.has(k)) selections.set(k, true);
      });

      listEl.innerHTML = '';

      if (entries.length === 0) {
        listEl.append(h('div', {
          style: 'padding: 32px; text-align: center; color: var(--text-muted);'
        },
          h('div', { style: 'font-weight: 600; margin-bottom: 4px;' },
            'No rewards in this window'),
          h('div', { style: 'font-size: 12px;' },
            'Apply some rewards or widen the time range.')
        ));
        updateSummary();
        return;
      }

      const byFacility = {};
      entries.forEach(e => {
        if (!byFacility[e.facility]) byFacility[e.facility] = [];
        byFacility[e.facility].push(e);
      });

      Object.keys(byFacility).sort().forEach(fac => {
        listEl.append(h('div', { class: 'bulk-facility' },
          fac + ' (' + byFacility[fac].length + ')'));
        byFacility[fac]
          .slice()
          .sort((a, b) => a.name.localeCompare(b.name))
          .forEach(entry => {
            const k = entryKey(entry);
            const cb = h('input', { type: 'checkbox' });
            cb.checked = selections.get(k);
            cb.addEventListener('change', () => {
              selections.set(k, cb.checked);
              updateSummary();
            });
            const label = h('span', { class: 'bulk-item-rewards' },
              entry.count + ' reward' + (entry.count !== 1 ? 's' : ''));
            listEl.append(h('div', { class: 'bulk-item' },
              cb,
              h('div', { class: 'bulk-item-name' },
                entry.name,
                h('span', { class: 'bulk-item-uname' }, entry.username)
              ),
              label
            ));
          });
      });
      updateSummary();
    }

    const windowSelect = h('select');
    [
      [0, 'Today'],
      [7, 'Last 7 days'],
      [30, 'Last 30 days'],
      [-1, 'All time']
    ].forEach(([v, lbl]) => {
      const o = document.createElement('option');
      o.value = String(v);
      o.textContent = lbl;
      if (v === windowDays) o.selected = true;
      windowSelect.append(o);
    });
    windowSelect.addEventListener('change', () => {
      windowDays = parseInt(windowSelect.value, 10);
      rebuildList();
    });

    const selectAll = h('button', { class: 'btn-sm btn-ghost' }, 'Select all');
    const selectNone = h('button', { class: 'btn-sm btn-ghost' }, 'Clear');
    selectAll.addEventListener('click', () => {
      getEntries().forEach(e => selections.set(entryKey(e), true));
      listEl.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = true);
      updateSummary();
    });
    selectNone.addEventListener('click', () => {
      getEntries().forEach(e => selections.set(entryKey(e), false));
      listEl.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
      updateSummary();
    });

    const generate = h('button', { class: 'btn-primary' }, 'Generate checklist');
    generate.addEventListener('click', () => {
      const entries = getEntries().filter(e => selections.get(entryKey(e)));
      if (entries.length === 0) { toast('Select at least one entry'); return; }
      const total = entries.reduce((s, e) => s + e.count, 0);
      openKineticChecklist(entries, total);
      close();
    });

    rebuildList();

    return h('div', {},
      h('h2', {}, 'Export reward checklist'),
      h('p', { class: 'modal-subtitle' },
        'Generates a printable checklist of rewards you have applied in the tracker, ' +
        'for taking to kineticconsole.com. Does not change the ledger.'
      ),
      h('div', {
        style: 'display:flex;align-items:center;gap:10px;margin-bottom:12px;font-size:13px;'
      },
        h('span', { style: 'color:var(--text-muted);' }, 'Time window:'),
        windowSelect
      ),
      h('div', { class: 'bulk-toolbar' },
        h('div', {}, 'Showing your applies only'),
        h('div', { style: 'display:flex;gap:4px;' }, selectAll, selectNone)
      ),
      h('div', { class: 'modal-body' }, listEl),
      h('div', { class: 'modal-footer' },
        summaryEl,
        h('button', { onclick: close }, 'Cancel'),
        generate
      )
    );
  }, { wide: true });
}

function confirmSignOut() {
  openModal(close => {
    return h('div', {},
      h('h2', {}, 'Sign out & clear local data?'),
      h('p', { class: 'modal-subtitle' },
        'Removes your name and the local copy of the ledger from this browser. Shared data on SharePoint is not affected. Use this when handing off a shared workstation to another rep.'
      ),
      h('div', { class: 'modal-footer' },
        h('button', { onclick: close }, 'Cancel'),
        h('button', { class: 'btn-danger', onclick: () => {
          try {
            localStorage.removeItem(USER_KEY);
            localStorage.removeItem(LOCAL_KEY);

// ---------- User chip + menu ----------
function toggleUserMenu() {
  const menu = document.getElementById('user-menu');
  if (!menu) return;
  menu.classList.toggle('open');
}
function closeUserMenu() {
  const menu = document.getElementById('user-menu');
  if (menu) menu.classList.remove('open');
}
document.addEventListener('click', e => {
  const menu = document.getElementById('user-menu');
  if (!menu || !menu.classList.contains('open')) return;
  const wrap = menu.closest('.user-chip-wrap');
  if (wrap && !wrap.contains(e.target)) closeUserMenu();
});

function buildUserChip() {
  const wrap = h('div', { class: 'user-chip-wrap' });
  const chipBtn = h('button', {
    class: 'btn-sm btn-ghost',
    onclick: e => { e.stopPropagation(); toggleUserMenu(); }
  }, '👤 ' + (getCurrentUser() || 'Sign in') + ' ▾');
  const menu = h('div', { class: 'user-menu', id: 'user-menu' },
    h('button', { class: 'user-menu-item', onclick: () => { closeUserMenu(); openRenameModal(); } }, 'Change name'),
    h('button', { class: 'user-menu-item', onclick: () => { closeUserMenu(); openSettingsModal(); } }, 'Settings'),
    h('div', { class: 'user-menu-divider' }),
    h('button', { class: 'user-menu-item', onclick: () => { closeUserMenu(); confirmSignOut(); } }, 'Sign out')
  );
  wrap.append(chipBtn, menu);
  return wrap;
}

// ---------- Card detail expand (no full re-render) ----------
function toggleCard(username) {
  const wasOpen = state.expanded === username;
  document.querySelectorAll('.inmate-detail.open').forEach(el => el.classList.remove('open'));
  document.querySelectorAll('.inmate-chevron.open').forEach(el => el.classList.remove('open'));
  if (wasOpen) {
    state.expanded = null;
    return;
  }
  state.expanded = username;
  const card = document.querySelector('[data-inmate="' + safeId(username) + '"]');
  if (card) {
    card.querySelector('.inmate-detail').classList.add('open');
    card.querySelector('.inmate-chevron').classList.add('open');
  }
}

function renderMap() {
  const main = document.getElementById('main');
  document.getElementById('header-actions').append(buildUserChip());

  function selectRow(label, headers, value, onchange) {
    const sel = h('select', { class: 'map-select' });
    sel.append(h('option', { value: '' }, '— not mapped —'));
    headers.forEach(hdr => {
      const opt = document.createElement('option');
      opt.value = hdr;
      opt.textContent = hdr;
      if (value === hdr) opt.selected = true;
      sel.append(opt);
    });
    sel.addEventListener('change', e => onchange(e.target.value));
    return h('div', { class: 'map-row' }, h('div', { class: 'map-label' }, label), sel);

  main.append(h('div', { class: 'map-wrap' },

      state.logsData.rows.length + ' rows detected. Confirm the column mapping below.'
    ),
    h('div', { class: 'map-section-title' }, 'Usage log columns'),
    selectRow('Inmate username / ID *', state.logsData.headers, state.colMap.username, v => { state.colMap.username = v; render(); }),
