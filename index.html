}

function openBulkApplyModal() {
  if (!requireSignIn()) return;
  const user = getCurrentUser();

  function isEligibleForUser(inmate) {
    const stats = getStats(inmate);
    return stats.eligible > 0 && (!stats.claimedBy || stats.claimedBy === user);
  }

  // Pre-count eligible inmates per facility so the dropdown can show counts
  // and we can decide a smart default.
  const eligibleByFacility = {};
  state.inmates.forEach(i => {
    if (!isEligibleForUser(i)) return;
    eligibleByFacility[i.facility] = (eligibleByFacility[i.facility] || 0) + 1;
  });
  const facilitiesWithEligible = Object.keys(eligibleByFacility).sort();

  if (facilitiesWithEligible.length === 0) {
    toast('No eligible inmates');
    return;
  }

  // Default to the dashboard's current facility filter if it has eligibles,
  // otherwise fall back to ALL so the modal is never empty on open.
  let facilityFilter =
    (state.filter && eligibleByFacility[state.filter]) ? state.filter : 'ALL';
  let mode = '1';
  // Selections are keyed by username and persist across facility switches,
  // but Apply only acts on inmates visible in the current facility view.
  const selections = new Map();

  function getVisibleEligible() {
    return state.inmates
      .map(i => ({ ...i, stats: getStats(i) }))
      .filter(isEligibleForUser)
      .filter(i => facilityFilter === 'ALL' || i.facility === facilityFilter)
      .sort((a, b) => {
        if (a.facility !== b.facility) return a.facility.localeCompare(b.facility);
        return (nameFor(a.username) || a.username)
          .localeCompare(nameFor(b.username) || b.username);
      });
  }

  openModal(close => {
    const summaryEl = h('div', { class: 'modal-footer-info' });
    const listEl = h('div', { class: 'bulk-list' });
    const headerInfoEl = h('div', {});

    function applyCountFor(inmate) {
      if (mode === 'all') return inmate.stats.eligible;
      return Math.min(parseInt(mode, 10) || 1, inmate.stats.eligible);
    }
    function selectedCount() {
      return getVisibleEligible().filter(i => selections.get(i.username)).length;
    }
    function totalRewards() {
      return getVisibleEligible()
        .filter(i => selections.get(i.username))
        .reduce((sum, i) => sum + applyCountFor(i), 0);
    }
    function updateSummary() {
      const t = totalRewards();
      const c = selectedCount();
      summaryEl.textContent = t + ' reward' + (t !== 1 ? 's' : '') +
        ' across ' + c + ' inmate' + (c !== 1 ? 's' : '');
    }

    function rebuildList() {
      const eligible = getVisibleEligible();

      // Default any newly-visible inmate to checked; preserve prior toggles.
      eligible.forEach(i => {
        if (!selections.has(i.username)) selections.set(i.username, true);
      });

      headerInfoEl.textContent = eligible.length + ' eligible inmate' +
        (eligible.length !== 1 ? 's' : '');
      listEl.innerHTML = '';

      if (eligible.length === 0) {
        listEl.append(h('div', {
          style: 'padding: 32px; text-align: center; color: var(--text-muted);'
        },
          h('div', { style: 'font-weight: 600; margin-bottom: 4px;' },
            'No eligible inmates here'),
          h('div', { style: 'font-size: 12px;' },
            'Try a different facility.')
        ));
        updateSummary();
        return;
      }

      const byFacility = {};
      eligible.forEach(i => {
        if (!byFacility[i.facility]) byFacility[i.facility] = [];
        byFacility[i.facility].push(i);
      });

      Object.keys(byFacility).sort().forEach(fac => {
        listEl.append(h('div', { class: 'bulk-facility' },
          fac + ' (' + byFacility[fac].length + ')'));
        byFacility[fac].forEach(inmate => {
          const cb = h('input', { type: 'checkbox' });
          cb.checked = selections.get(inmate.username);
          cb.addEventListener('change', () => {
            selections.set(inmate.username, cb.checked);
            updateSummary();
          });
          const rewardsLabel = h('span', { class: 'bulk-item-rewards' });
          function updateRewardsLabel() {
            const count = applyCountFor(inmate);
            rewardsLabel.textContent = count + ' reward' + (count !== 1 ? 's' : '');
          }
          updateRewardsLabel();
          rewardsLabel._update = updateRewardsLabel;
          listEl.append(h('div', { class: 'bulk-item' },
            cb,
            h('div', { class: 'bulk-item-name' },
              (nameFor(inmate.username) || inmate.username),
              h('span', { class: 'bulk-item-uname' }, inmate.username)
            ),
            rewardsLabel
          ));
        });
      });
      updateSummary();
    }

    function refreshAllRewardLabels() {
      listEl.querySelectorAll('.bulk-item-rewards')
        .forEach(el => el._update && el._update());
      updateSummary();
    }

    // Facility dropdown — only lists facilities that actually have eligibles.
    const facilitySelect = h('select');
    const totalEligible = facilitiesWithEligible.reduce(
      (s, f) => s + eligibleByFacility[f], 0
    );
    const allOpt = document.createElement('option');
    allOpt.value = 'ALL';
    allOpt.textContent = 'All facilities (' + totalEligible + ')';
    if (facilityFilter === 'ALL') allOpt.selected = true;
    facilitySelect.append(allOpt);
    facilitiesWithEligible.forEach(fac => {
      const o = document.createElement('option');
      o.value = fac;
      o.textContent = fac + ' (' + eligibleByFacility[fac] + ')';
      if (fac === facilityFilter) o.selected = true;
      facilitySelect.append(o);
    });
    facilitySelect.addEventListener('change', () => {
      facilityFilter = facilitySelect.value;
      rebuildList();
    });

    const radioOne = h('input', { type: 'radio', name: 'bulk-mode', value: '1' });
    const radioTwo = h('input', { type: 'radio', name: 'bulk-mode', value: '2' });
    const radioAll = h('input', { type: 'radio', name: 'bulk-mode', value: 'all' });
    radioOne.checked = true;
    radioOne.addEventListener('change', () => { if (radioOne.checked) { mode = '1'; refreshAllRewardLabels(); } });
    radioTwo.addEventListener('change', () => { if (radioTwo.checked) { mode = '2'; refreshAllRewardLabels(); } });
    radioAll.addEventListener('change', () => { if (radioAll.checked) { mode = 'all'; refreshAllRewardLabels(); } });

    const selectAll = h('button', { class: 'btn-sm btn-ghost' }, 'Select all');
    const selectNone = h('button', { class: 'btn-sm btn-ghost' }, 'Clear');
    selectAll.addEventListener('click', () => {
      getVisibleEligible().forEach(i => selections.set(i.username, true));
      listEl.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = true);
      updateSummary();
    });
    selectNone.addEventListener('click', () => {
      getVisibleEligible().forEach(i => selections.set(i.username, false));
      listEl.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
      updateSummary();
    });

    const apply = h('button', { class: 'btn-primary' }, 'Apply & open checklist');
    apply.addEventListener('click', () => {
      const targets = getVisibleEligible()
        .filter(i => selections.get(i.username))
        .map(i => i.username);
      if (targets.length === 0) { toast('Select at least one inmate'); return; }
      executeBulkApply(targets, mode);
    });

    rebuildList();

    return h('div', {},
      h('h2', {}, 'Bulk apply rewards'),
      h('p', { class: 'modal-subtitle' },
        'Marks rewards as applied in the tracker AND opens a styled checklist for kineticconsole.com.'
      ),
      h('div', {
        style: 'display:flex;align-items:center;gap:10px;margin-bottom:10px;font-size:13px;'
      },
        h('span', { style: 'color:var(--text-muted);' }, 'Facility:'),
        facilitySelect
      ),
      h('div', { class: 'bulk-radio-row' },
        h('label', {}, radioOne, h('span', {}, 'Apply 1 per inmate')),
        h('label', {}, radioTwo, h('span', {}, 'Apply 2 per inmate')),
        h('label', {}, radioAll, h('span', {}, 'Apply all eligible'))
      ),
      h('div', { class: 'bulk-toolbar' },
        headerInfoEl,
        h('div', { style: 'display:flex;gap:4px;' }, selectAll, selectNone)
      ),
      h('div', { class: 'modal-body' }, listEl),
      h('div', { class: 'modal-footer' },
        summaryEl,
        h('button', { onclick: close }, 'Cancel'),
        apply
      )
    );
  }, { wide: true });
}

// Build a checklist from rewards the current user has already applied in the
// tracker — for the manual-apply workflow where rewards trickle in one at a
// time and the user wants a single doc to take to Kinetic at the end.
function openExportChecklistModal() {
  if (!requireSignIn()) return;
  const user = getCurrentUser();

  // -1 = all time, 0 = today only, N = last N days
  let windowDays = 0;

  function getEntries() {
    let cutoff;
    if (windowDays === -1) {
      cutoff = 0;
    } else if (windowDays === 0) {
      const d = new Date();
      d.setHours(0, 0, 0, 0);
      cutoff = d.getTime();
    } else {
      cutoff = Date.now() - windowDays * 86400000;
    }

    const entries = [];
    Object.entries(state.ledger).forEach(([username, rec]) => {
      if (!rec.rewardHistory) return;
      const recent = rec.rewardHistory.filter(e => {
        const t = new Date(e.appliedAt).getTime();
        return !isNaN(t) && t >= cutoff && e.appliedBy === user;
      });
      if (recent.length === 0) return;

      const byFacility = {};
      recent.forEach(e => {
        const fac = e.facility || 'Unknown';
        byFacility[fac] = (byFacility[fac] || 0) + 1;
      });

      Object.entries(byFacility).forEach(([fac, count]) => {
        entries.push({
          username,
          name: nameFor(username) || username,
          facility: fac,
          count
        });
      });
    });

    return entries;
  }

  function entryKey(e) { return e.username + '|' + e.facility; }

  const selections = new Map();

  openModal(close => {
    const summaryEl = h('div', { class: 'modal-footer-info' });
    const listEl = h('div', { class: 'bulk-list' });

    function selectedTotal() {
      let total = 0;
      let count = 0;
      getEntries().forEach(e => {
        if (selections.get(entryKey(e))) {
          total += e.count;
          count += 1;
        }
      });
      return { total, count };
    }
    function updateSummary() {
      const { total, count } = selectedTotal();
      summaryEl.textContent = total + ' reward' + (total !== 1 ? 's' : '') +
        ' across ' + count + ' inmate' + (count !== 1 ? 's' : '');
    }

    function rebuildList() {
      const entries = getEntries();
      entries.forEach(e => {
        const k = entryKey(e);
        if (!selections.has(k)) selections.set(k, true);
      });

      listEl.innerHTML = '';

      if (entries.length === 0) {
        listEl.append(h('div', {
          style: 'padding: 32px; text-align: center; color: var(--text-muted);'
        },
          h('div', { style: 'font-weight: 600; margin-bottom: 4px;' },
            'No rewards in this window'),
          h('div', { style: 'font-size: 12px;' },
            'Apply some rewards or widen the time range.')
        ));
        updateSummary();
        return;
      }

      const byFacility = {};
      entries.forEach(e => {
        if (!byFacility[e.facility]) byFacility[e.facility] = [];
        byFacility[e.facility].push(e);
      });

      Object.keys(byFacility).sort().forEach(fac => {
        listEl.append(h('div', { class: 'bulk-facility' },
          fac + ' (' + byFacility[fac].length + ')'));
        byFacility[fac]
          .slice()
          .sort((a, b) => a.name.localeCompare(b.name))
          .forEach(entry => {
            const k = entryKey(entry);
            const cb = h('input', { type: 'checkbox' });
            cb.checked = selections.get(k);
            cb.addEventListener('change', () => {
              selections.set(k, cb.checked);
              updateSummary();
            });
            const label = h('span', { class: 'bulk-item-rewards' },
              entry.count + ' reward' + (entry.count !== 1 ? 's' : ''));
            listEl.append(h('div', { class: 'bulk-item' },
              cb,
              h('div', { class: 'bulk-item-name' },
                entry.name,
                h('span', { class: 'bulk-item-uname' }, entry.username)
              ),
              label
            ));
          });
      });
      updateSummary();
    }

    const windowSelect = h('select');
    [
      [0, 'Today'],
      [7, 'Last 7 days'],
      [30, 'Last 30 days'],
      [-1, 'All time']
    ].forEach(([v, lbl]) => {
      const o = document.createElement('option');
      o.value = String(v);
      o.textContent = lbl;
      if (v === windowDays) o.selected = true;
      windowSelect.append(o);
    });
    windowSelect.addEventListener('change', () => {
      windowDays = parseInt(windowSelect.value, 10);
      rebuildList();
    });

    const selectAll = h('button', { class: 'btn-sm btn-ghost' }, 'Select all');
    const selectNone = h('button', { class: 'btn-sm btn-ghost' }, 'Clear');
    selectAll.addEventListener('click', () => {
      getEntries().forEach(e => selections.set(entryKey(e), true));
      listEl.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = true);
      updateSummary();
    });
    selectNone.addEventListener('click', () => {
      getEntries().forEach(e => selections.set(entryKey(e), false));
      listEl.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
      updateSummary();
    });

    const generate = h('button', { class: 'btn-primary' }, 'Generate checklist');
    generate.addEventListener('click', () => {
      const entries = getEntries().filter(e => selections.get(entryKey(e)));
      if (entries.length === 0) { toast('Select at least one entry'); return; }
      const total = entries.reduce((s, e) => s + e.count, 0);
      openKineticChecklist(entries, total);
      close();
    });

    rebuildList();

    return h('div', {},
      h('h2', {}, 'Export reward checklist'),
      h('p', { class: 'modal-subtitle' },
        'Generates a printable checklist of rewards you have applied in the tracker, ' +
        'for taking to kineticconsole.com. Does not change the ledger.'
      ),
      h('div', {
        style: 'display:flex;align-items:center;gap:10px;margin-bottom:12px;font-size:13px;'
      },
        h('span', { style: 'color:var(--text-muted);' }, 'Time window:'),
        windowSelect
      ),
      h('div', { class: 'bulk-toolbar' },
        h('div', {}, 'Showing your applies only'),
        h('div', { style: 'display:flex;gap:4px;' }, selectAll, selectNone)
      ),
      h('div', { class: 'modal-body' }, listEl),
      h('div', { class: 'modal-footer' },
        summaryEl,
        h('button', { onclick: close }, 'Cancel'),
        generate
      )
    );
  }, { wide: true });
}

// ---------- User chip + menu ----------
function toggleUserMenu() {
  const menu = document.getElementById('user-menu');
  if (!menu) return;
  menu.classList.toggle('open');
}
function closeUserMenu() {
  const menu = document.getElementById('user-menu');
  if (menu) menu.classList.remove('open');
}

function toggleCard(username) {
  const wasOpen = state.expanded === username;
  document.querySelectorAll('.inmate-detail.open').forEach(el => el.classList.remove('open'));
  document.querySelectorAll('.inmate-chevron.open').forEach(el => el.classList.remove('open'));

    card.querySelector('.inmate-chevron').classList.add('open');

// ---------- Gist settings modal ----------
function openGistSettings() {
  const existing = document.getElementById('gist-modal-overlay');
  if (existing) existing.remove();
  const configured = GIST.isConfigured();
  const overlay = h('div', { id: 'gist-modal-overlay', class: 'modal-overlay' },
    h('div', { class: 'modal' },
      h('h2', {}, 'GitHub Gist Sync'),
      h('p', { class: 'modal-subtitle' },
        configured
          ? 'Gist sync is active. You and Lauren save to the same Gist — anyone with this link sees live data.'
          : 'Connect a GitHub Gist so everyone using this tracker shares the same live data.'
      ),
      h('div', { class: 'modal-body' },
        h('div', { class: 'form-row' },
          h('label', { class: 'form-label', for: 'gist-token-input' }, 'GitHub Token'),
          h('input', { id: 'gist-token-input', class: 'input', type: 'password',
            placeholder: 'ghp_xxxxxxxxxxxxxxxxxxxx', value: GIST.getToken(),
            style: 'width:100%;box-sizing:border-box;' }),
          h('p', { class: 'form-help' }, 'Fine-grained token with Gist read+write scope. Stored only in this browser.')
        ),
        h('div', { class: 'form-row' },
          h('label', { class: 'form-label', for: 'gist-id-input' }, 'Gist ID'),
          h('input', { id: 'gist-id-input', class: 'input', type: 'text',
            placeholder: 'e.g. a1b2c3d4e5f6...', value: GIST.getGistId(),
            style: 'width:100%;box-sizing:border-box;' }),
          h('p', { class: 'form-help' }, 'The ID from your Gist URL: gist.github.com/username/«this-part»')
        ),
        configured ? h('div', {
          style: 'background:var(--green-bg);border:1px solid var(--green-border);border-radius:var(--radius);padding:10px 12px;font-size:12px;color:var(--green-text);'
        }, '✓ Connected — last synced ' + (state.gistUpdatedAt ? new Date(state.gistUpdatedAt).toLocaleString() : 'n/a')) : h('span', {})
      ),
      h('div', { class: 'modal-footer' },
        configured ? h('button', {
          class: 'btn btn-ghost', style: 'color:#d94f4f;margin-right:auto;',
          onclick: function() {
            GIST.setToken(''); GIST.setGistId(''); overlay.remove();
            setSyncStatus('local', 'Local only — configure Gist to share');
            toast('Gist sync disconnected');
          }
        }, 'Disconnect') : h('span', {}),
        h('button', { class: 'btn btn-ghost', onclick: () => overlay.remove() }, 'Cancel'),
        h('button', { class: 'btn btn-primary', onclick: async function() {
          const token  = document.getElementById('gist-token-input').value.trim();
          const gistId = document.getElementById('gist-id-input').value.trim();
          if (!token || !gistId) { toast('Please enter both a token and Gist ID'); return; }
          GIST.setToken(token); GIST.setGistId(gistId);
          overlay.remove();
          setSyncStatus('saving', 'Connecting to Gist...');
          const g = await GIST.load();
          if (g.ledger || g.facilityData) {
            if (g.ledger)       state.ledger       = g.ledger;
            if (g.facilityData) state.facilityData = g.facilityData;
            if (g.meta)         state.meta         = g.meta;
            state.gistUpdatedAt = g.updatedAt;
            normalizeFacilityData(); normalizeLedger(); syncMetaNameMap();
            state.inmates = flattenFacilities();
            state.phase = state.inmates.length > 0 ? 'dashboard' : 'upload';
            setSyncStatus('synced', 'Live — GitHub Gist');
            toast('Connected! Loaded data from Gist.'); render();
          } else {
            const sr = await persistAll();
            if (sr.ok) { toast('Connected! Local data pushed to Gist.'); }
            else { toast('Token or Gist ID may be wrong — check and try again.'); GIST.setToken(''); GIST.setGistId(''); }
          }
        }}, 'Save & Connect')
      )
    )
  );
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  document.body.append(overlay);
}

function buildList(container, processed) {
  container.innerHTML = '';
  const elig = processed.filter(i => i.stats.eligible > 0);
  const weeklyCapped = processed.filter(i => i.stats.eligible === 0 && i.stats.weeklyLimitReached);
  const nyet = processed.filter(i => i.stats.eligible === 0 && !i.stats.weeklyLimitReached);

  if (!elig.length && !weeklyCapped.length && !nyet.length) {
    container.append(
      h('div', { class: 'empty-state' },
        h('div', { class: 'empty-state-title' }, 'No results'),
        h('p', {}, 'Try adjusting your search or filter')
      )
    );
    return;
  }

  if (elig.length) {
    container.append(h('div', { class: 'section-heading' }, 'Eligible for reward — ' + elig.length + ' inmates'));
    elig.forEach(i => container.append(inmateCard(i)));
  }
  if (weeklyCapped.length) {
    container.append(h('div', { class: 'section-heading' }, 'Weekly limit reached — ' + weeklyCapped.length + ' inmate' + (weeklyCapped.length !== 1 ? 's' : '')));

  if (nyet.length) {
    container.append(h('div', { class: 'section-heading' }, 'Not yet eligible — ' + nyet.length + ' inmate' + (nyet.length !== 1 ? 's' : '')));

  }

function inmateCard(inmate) {

    h('div', { class: 'note-label' }, 'Notes'),
    h('textarea', {
      id: 'note-' + safeId(inmate.username),

  return h('div', { class: 'inmate-card', 'data-inmate': safeId(inmate.username) }, header, detail);
}

  }

  function mtGroupCard(g, onMerged) {
    const card = h('div', { style: 'border:1px solid var(--border);border-radius:var(--radius);padding:10px;background:var(--surface);' });
    const title = h('div', { style: 'font-weight:600;margin-bottom:6px;' }, g.name);
    if (g.fullyMerged) title.append(h('span', { style: 'margin-left:8px;font-weight:500;color:var(--green-text);font-size:12px;' }, '✓ merged'));
    if (g.ambiguous && !g.fullyMerged) title.append(h('span', { style: 'margin-left:8px;font-weight:500;color:var(--amber-text);font-size:12px;' }, '⚠ verify same person'));
    card.append(title);

    if (g.fullyMerged) {
      const primary = mtResolve(g.accounts[0].username);
      const rec = state.ledger[primary] || {};
      card.append(h('div', { class: 'form-help' }, 'All folded into ' + primary + ' — ' + (rec.rewarded || 0) + ' rewards.'));
      return card;
    }

    const chosen = { primary: mtDefaultPrimary(g), fold: {} };
    g.accounts.forEach(a => { chosen.fold[a.username] = true; });

    const rows = h('div', { style: 'display:flex;flex-direction:column;gap:3px;margin-bottom:6px;' });
    const preview = h('div', { class: 'form-help', style: 'margin:4px 0;' }, '');
    function refresh() {
      const incl = g.accounts.filter(a => a.username === chosen.primary || chosen.fold[a.username]);
      const r = incl.reduce((s, a) => s + (a.rewards || 0), 0);
      const hh = incl.reduce((s, a) => s + (a.hours || 0) + (a.recovered || 0), 0);
      const rec = incl.reduce((s, a) => s + (a.recovered || 0), 0);
      preview.textContent = '→ Result on ' + chosen.primary + ': ' + r + ' rewards, ' + hh.toFixed(2) + 'h'
        + (rec > 0.01 ? ' (incl. ' + rec.toFixed(2) + 'h recovered from pre-migration)' : '');
    }
    g.accounts.forEach(a => {
      const radio = h('input', { type: 'radio', name: 'pri_' + mtNorm(g.name) + Math.random().toString(36).slice(2, 6), style: 'margin-right:4px;' });
      radio.checked = (a.username === chosen.primary);
      radio.addEventListener('change', () => { chosen.primary = a.username; chosen.fold[a.username] = true; refresh(); });
      const chk = h('input', { type: 'checkbox', style: 'margin:0 4px 0 10px;' });
      chk.checked = !!chosen.fold[a.username];
      chk.addEventListener('change', () => { chosen.fold[a.username] = chk.checked; refresh(); });
      const meta = (a.hours == null ? 'no hours' : a.hours.toFixed(2) + 'h') + ' · ' + (a.rewards || 0) + ' rewards · ' + (a.inRoster ? 'active' : 'orphan')
        + (a.recovered > 0.01 ? ' · +' + a.recovered.toFixed(2) + 'h recoverable' : '');
      const row = h('label', { style: 'display:flex;align-items:center;font-size:13px;cursor:pointer;' },
        radio, h('span', { style: 'min-width:54px;color:var(--text-muted);font-size:11px;' }, 'primary'),
        chk, h('span', { style: 'font-family:var(--mono);' }, a.username),
        h('span', { style: 'margin-left:8px;color:var(--text-muted);' }, '— ' + meta));
      rows.append(row);
    });
    card.append(rows, preview);
    const btn = h('button', { class: 'btn-sm btn-primary' }, 'Merge group');
    btn.addEventListener('click', async () => {
      const fold = g.accounts.map(a => a.username).filter(u => u === chosen.primary || chosen.fold[u]);
      const others = fold.filter(u => u !== chosen.primary);
      if (!others.length) { toast('Pick at least one account to fold in'); return; }
      btn.disabled = true; btn.textContent = 'Merging…';
      const res = await mtApplyMerge(chosen.primary, fold);
      toast(res.message || 'Merged');
      onMerged();
    });
    card.append(btn);
    refresh();
    return card;
  }

  // ---- BUTTON INJECTION -------------------------------------------------
  function mtInjectButton() {
    const host = document.getElementById('header-actions');
    if (!host || document.getElementById('mt-merge-btn')) return;
    const btn = h('button', { id: 'mt-merge-btn', class: 'btn-sm btn-ghost', title: 'Merge duplicate inmate accounts', onclick: mtOpenModal }, 'Merge accts');
    host.prepend(btn);
  }
  if (!render.__mtPatched) {
    const _render = render;
    window.render = function () { const r = _render.apply(this, arguments); try { mtInjectButton(); } catch (e) {} return r; };
    window.render.__mtPatched = true;
  }

  try { if (Object.keys(mtAliases()).length) { state.inmates = flattenFacilities(); } } catch (e) {}
  try { mtInjectButton(); } catch (e) {}
  window.mtBuildGroups = mtBuildGroups; // exposed for diagnostics
})();
</script>
</body>
</html>
